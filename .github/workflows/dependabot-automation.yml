name: Dependabot Automation

on:
  pull_request:
    types: [opened, synchronized]

permissions:
  pull-requests: write
  contents: read

jobs:
  rename-dependabot-pr:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check and rename PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const fs = require('fs');
            const composer = JSON.parse(fs.readFileSync('composer.json', 'utf8'));
            const prodDeps = Object.keys(composer.require || {});

            // Dependabot titles usually look like: "chore(deps): bump vendor/package from X to Y"
            // or if grouped: "chore(deps): bump the production-deps group with 2 updates"

            if (pr.title.includes('production-deps group')) {
              const newTitle = pr.title.replace(/^chore\(deps\):/, 'fix(deps):');
              if (newTitle !== pr.title) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  title: newTitle
                });
                console.log(`Renamed grouped PR to: ${newTitle}`);
              }
            } else {
              const match = pr.title.match(/bump ([\w\-\.\/]+) from/);
              if (match) {
                const packageName = match[1];
                if (prodDeps.includes(packageName)) {
                  const newTitle = pr.title.replace(/^chore\(deps\):/, 'fix(deps):');
                  if (newTitle !== pr.title) {
                    await github.rest.pulls.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: context.issue.number,
                      title: newTitle
                    });
                    console.log(`Renamed single PR for ${packageName} to: ${newTitle}`);
                  }
                }
              }
            }
